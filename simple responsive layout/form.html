<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
        nav{
            display: flex;
            justify-content: space-between;
        }
        nav a{
            text-decoration: none;
            color: black;
        }
        .login-form-cont{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
        .login-form{
            display: flex;
            flex-direction: column;
            width: 50%;
        }
        .login-form input{
            margin-top: 20px;
            padding: 1.5em;
        }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="">Home</a>
            <a href="">Profile</a>
            <a href="">blog</a>
            <a href="">About</a>
        </div>    
        <a href="">login</a>
    </nav>
  <section class="login-form-cont">
      <form class="login-form">
        <h3>Please login</h3>
        <input type="email" name="" id="" placeholder="Your Email">
        <input type="password" name="" id="" placeholder="Your password">
        <input type="submit" value="submit">
    </form>
  </section>
</body>
</html>
